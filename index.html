<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; }

  /* House of Fire shared display class */
  .hof-display { font-family: 'Clash Display', 'Inter', system-ui, sans-serif; }
  .hof-mono    { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }

  /* Hide native scroll inside artboards */
  .hof-scroll::-webkit-scrollbar { display: none; }
  .hof-scroll { scrollbar-width: none; }

  /* Shimmer keyframes for loading + gold badge */
  @keyframes hof-shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes hof-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }
  @keyframes hof-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,101,26,0.0); }
    50%      { box-shadow: 0 0 24px 4px rgba(232,101,26,0.25); }
  }
  @keyframes hof-scanline {
    0%   { transform: translateY(0); opacity: 0.0; }
    8%   { opacity: 1; }
    50%  { transform: translateY(258px); opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translateY(0); opacity: 0; }
  }

  /* Press effect */
  .hof-press { transition: transform 80ms ease-out; }
  .hof-press:active { transform: scale(0.97); }

  /* No-decoration buttons */
  button.hof-btn { font-family: inherit; border: 0; cursor: pointer; padding: 0; background: none; color: inherit; }
</style>
