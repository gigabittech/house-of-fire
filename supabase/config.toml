# Local Supabase (optional). Run from repo root:
#   supabase start
# Requires repo root `.env` for Supabase CLI env() (copy from `.env.local` or symlink).

project_id = "house-of-fire"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
# Literal values: the Supabase branching executor cannot resolve env() from the
# (gitignored) repo .env, which left these unset and failed the branch workflow.
# Staging branch auth is configured here; production auth config is managed via
# the dashboard / scripts (branch deploys to production ignore auth config).
site_url = "https://staging.houseoffire.events"
# GoTrue matches redirect URLs as globs against the FULL URL, so each callback
# needs a bare entry AND a `?*` variant for query params.
additional_redirect_urls = [
  "https://staging.houseoffire.events/auth/callback",
  "https://staging.houseoffire.events/auth/callback?*",
  "https://staging.houseoffire.events/auth/callback/client",
  "https://staging.houseoffire.events/auth/callback/client?*",
  "https://houseoffire.events/auth/callback",
  "https://houseoffire.events/auth/callback?*",
  "https://houseoffire.events/auth/callback/client",
  "https://houseoffire.events/auth/callback/client?*",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/callback?*",
  "http://localhost:3000/auth/callback/client",
  "http://localhost:3000/auth/callback/client?*",
]
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Google OAuth — create credentials at https://console.cloud.google.com/apis/credentials
# Authorized redirect URI: https://<project-ref>.supabase.co/auth/v1/callback
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
skip_nonce_check = false

# Resend SMTP — same settings as hosted (see scripts/configure-supabase-auth-smtp.mjs).
# https://supabase.com/docs/guides/auth/auth-smtp
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
# Secret — set on the staging branch with:
#   supabase secrets set --project-ref ejsgltkyqyecnbshoecv RESEND_API_KEY=<staging key>
pass = "env(RESEND_API_KEY)"
admin_email = "tickets@houseoffire.events"
sender_name = "House of Fire"
